# nginx vhost for the Rotom interactive map (static site).
# Install: see deploy/README.md. Certbot will append the HTTPS block.
server {
    listen 80;
    listen [::]:80;
    server_name rotom-pogo.mxrine-mz.dev;

    root /var/www/rotom-pogo;
    index index.html;

    # Static files only — no upstream app.
    location / {
        try_files $uri $uri/ =404;
    }

    # Counts are refreshed often; don't let browsers cache them.
    location = /counts.json {
        add_header Cache-Control "no-store";
    }
}
