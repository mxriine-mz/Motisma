# nginx vhost for the POGO PAU site (React SPA) + web API reverse proxy.
# Install: see deploy/README.md. Certbot mirrors this into the HTTPS (443) block.
#
# Key differences vs the old static-only config:
#   - try_files falls back to /index.html so client-side routes (/classement,
#     /profil, ...) work on reload.
#   - /api/ is proxied to the Fastify API published on 127.0.0.1:3100.
server {
    listen 80;
    listen [::]:80;
    server_name pogo-pau.mxrine-mz.dev;

    root /var/www/pogo-pau;
    index index.html;

    # Web API (Docker, published on localhost only).
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Counts are refreshed often; don't let browsers cache them.
    location = /counts.json {
        add_header Cache-Control "no-store";
    }

    # Long-cache the hashed build assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: unknown paths render the app shell, not a 404.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
